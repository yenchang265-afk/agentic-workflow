description: Triage for the PR sitter's TRIAGE stage. Read-only inspection of a pull request — unanswered review comments, failing checks (with real errors pulled from logs), conflict state — emitted as a structured findings list, plus a loop_verdict (PASS = actionable work exists). Never edits, never pushes.
mode: subagent
permission:
  edit: deny
  webfetch: deny
  bash:
    "*": deny
    # Both platforms are allowed here (static frontmatter can't switch); config
    # codePlatform decides which the stage prompt actually uses. ADO is the REST
    # API via curl+PAT — host-pinned so the PAT never leaves an ADO host.
    # {{allowlist}} — globs generated from the stage's allowlists in loops/*/loop.json; edit the manifest, not here
