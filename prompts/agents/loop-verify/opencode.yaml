description: Verifier for the VERIFY stage. Runs tests and checks the build against the plan's acceptance criteria, then records a LOOP_VERIFY verdict via the loop_verdict tool. Runs an allowlisted set of read/test commands but never edits files or fixes code.
mode: subagent
permission:
  edit: deny
  webfetch: deny
  bash:
    "*": deny
    "git status*": allow
    "git diff*": allow
    "git log*": allow
    "git show*": allow
    "git -C * status*": allow
    "git -C * diff*": allow
    "git -C * log*": allow
    "git -C * show*": allow
    "ls*": allow
    "cat *": allow
    "head *": allow
    "tail *": allow
    "grep *": allow
    "find *": allow
    "wc *": allow
    "npm test*": allow
    "npm run *": allow
    "pnpm test*": allow
    "pnpm run *": allow
    "yarn test*": allow
    "yarn run *": allow
    "bun test*": allow
    "node --test*": allow
    "npx tsc*": allow
    "npx vitest*": allow
    "npx jest*": allow
    "npx eslint*": allow
    "pytest*": allow
    "go test*": allow
    "cargo test*": allow
    "make test*": allow
    "make check*": allow
    "cd * && npm test*": allow
    "cd * && npm run *": allow
    "cd * && pnpm test*": allow
    "cd * && pnpm run *": allow
    "cd * && yarn test*": allow
    "cd * && yarn run *": allow
    "cd * && bun test*": allow
    "cd * && node --test*": allow
    "cd * && npx tsc*": allow
    "cd * && npx vitest*": allow
    "cd * && npx jest*": allow
    "cd * && npx eslint*": allow
    "cd * && pytest*": allow
    "cd * && go test*": allow
    "cd * && cargo test*": allow
    "cd * && make test*": allow
    "cd * && make check*": allow
