description: Verifier for the VERIFY stage. Runs tests and checks the build against the plan's acceptance criteria, then records a LOOP_VERIFY verdict via the loop_verdict tool. Runs an allowlisted set of read/test commands but never edits files or fixes code.
mode: subagent
permission:
  edit: deny
  webfetch: deny
  bash:
    "*": deny
    "git status*": allow
    "git diff*": allow
    "git log*": allow
    "git show*": allow
    "git -C * status*": allow
    "git -C * diff*": allow
    "git -C * log*": allow
    "git -C * show*": allow
    "ls*": allow
    "cat *": allow
    "head *": allow
    "tail *": allow
    "grep *": allow
    "find *": allow
    "wc *": allow
    "npm ci*": allow
    "npm install*": allow
    "npm audit*": allow
    "npm ls*": allow
    "npm outdated*": allow
    "osv-scanner *": allow
    "mvn test*": allow
    "mvn verify*": allow
    "mvn dependency:tree*": allow
    "./mvnw test*": allow
    "./mvnw verify*": allow
    "./mvnw dependency:tree*": allow
    "gradle test*": allow
    "gradle check*": allow
    "gradle build*": allow
    "gradle dependencyInsight*": allow
    "./gradlew test*": allow
    "./gradlew check*": allow
    "./gradlew build*": allow
    "./gradlew dependencyInsight*": allow
    "npm test*": allow
    "npm run *": allow
    "pnpm test*": allow
    "pnpm run *": allow
    "yarn test*": allow
    "yarn run *": allow
    "bun test*": allow
    "node --test*": allow
    "npx tsc*": allow
    "npx vitest*": allow
    "npx jest*": allow
    "npx eslint*": allow
    "pytest*": allow
    "go test*": allow
    "cargo test*": allow
    "make test*": allow
    "make check*": allow
    "cd * && npm ci*": allow
    "cd * && npm install*": allow
    "cd * && npm audit*": allow
    "cd * && npm ls*": allow
    "cd * && osv-scanner *": allow
    "cd * && mvn test*": allow
    "cd * && mvn verify*": allow
    "cd * && mvn dependency:tree*": allow
    "cd * && ./mvnw test*": allow
    "cd * && ./mvnw verify*": allow
    "cd * && ./mvnw dependency:tree*": allow
    "cd * && gradle test*": allow
    "cd * && gradle check*": allow
    "cd * && gradle build*": allow
    "cd * && gradle dependencyInsight*": allow
    "cd * && ./gradlew test*": allow
    "cd * && ./gradlew check*": allow
    "cd * && ./gradlew build*": allow
    "cd * && ./gradlew dependencyInsight*": allow
    "cd * && npm test*": allow
    "cd * && npm run *": allow
    "cd * && pnpm test*": allow
    "cd * && pnpm run *": allow
    "cd * && yarn test*": allow
    "cd * && yarn run *": allow
    "cd * && bun test*": allow
    "cd * && node --test*": allow
    "cd * && npx tsc*": allow
    "cd * && npx vitest*": allow
    "cd * && npx jest*": allow
    "cd * && npx eslint*": allow
    "cd * && pytest*": allow
    "cd * && go test*": allow
    "cd * && cargo test*": allow
    "cd * && make test*": allow
    "cd * && make check*": allow
