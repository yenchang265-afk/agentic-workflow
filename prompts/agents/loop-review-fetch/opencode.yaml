description: Fetch for the review sitter's FETCH stage. Read-only confirmation that a requested review is still wanted, plus diff sizing and a review work order, ending in a loop_verdict (PASS = reviewable). Never edits, never comments, never votes.
mode: subagent
permission:
  edit: deny
  webfetch: deny
  bash:
    "*": deny
    # Both platforms are allowed here (static frontmatter can't switch); config
    # codePlatform decides which the stage prompt actually uses.
    "gh pr view*": allow
    "gh pr diff*": allow
    "gh pr checks*": allow
    "gh api *": allow
    "curl -sS -u :* https://dev.azure.com/*": allow
    "curl -sS -u :* https://*.visualstudio.com/*": allow
    "git status*": allow
    "git diff*": allow
    "git log*": allow
    "git show*": allow
    "git fetch*": allow
    "git -C * status*": allow
    "git -C * diff*": allow
    "git -C * log*": allow
    "git -C * show*": allow
    "git -C * fetch*": allow
    "ls*": allow
    "cat *": allow
    "head *": allow
    "tail *": allow
    "grep *": allow
    "find *": allow
    "wc *": allow
