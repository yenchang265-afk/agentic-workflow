name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Typecheck and unit tests (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (builds @agentic-workflow/core via prepare)
        run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck:all

      - name: Test (all workspaces + Claude hooks)
        run: npm run test:all

      - name: Generated prompts are in sync with prompts/ sources
        run: |
          node scripts/gen-prompts.mjs
          git diff --exit-code -- plugins/opencode/agents plugins/claude/agents

      - name: Bundled hooks are in sync with hooks/src/ sources
        run: |
          node scripts/build-hooks.mjs
          git diff --exit-code -- plugins/claude/hooks

      - name: Build and smoke-run the MCP server
        run: |
          npm run build -w agentic-workflow-mcp
          out=$(node plugins/claude/mcp-server/dist/server.js < /dev/null 2>&1 | head -1)
          echo "$out"
          echo "$out" | grep -q "MCP server ready"

      - name: Shell-script syntax check
        run: bash -n install.sh uninstall.sh bootstrap.sh scripts/clean.sh plugins/claude/install.sh

      - name: Shellcheck
        run: shellcheck --severity=error install.sh uninstall.sh bootstrap.sh scripts/clean.sh plugins/claude/install.sh

      - name: Install-script round trip (install twice, then uninstall)
        run: |
          d=$(mktemp -d)
          ./install.sh opencode "$d"
          ./install.sh opencode "$d"
          ./uninstall.sh opencode "$d"
          leftovers=$(find "$d" -lname "$GITHUB_WORKSPACE/*" 2>/dev/null)
          if [ -n "$leftovers" ]; then
            echo "uninstall left entries behind:"; echo "$leftovers"; exit 1
          fi
