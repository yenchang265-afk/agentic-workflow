name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Typecheck and unit tests (opencode plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  test-mcp-server:
    name: Typecheck and unit tests (claude-plugin mcp-server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-plugin/mcp-server
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
